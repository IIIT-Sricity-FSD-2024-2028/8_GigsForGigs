<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GigsForGigs Admin</title>
  <meta name="description" content="GigsForGigs Super Admin Dashboard — platform health, KPIs, and recent activity.">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/super-admin.css">
</head>
<body>
<div class="admin-sidebar" id="admin-sidebar"></div>
<main class="admin-main">
  <header class="admin-page-header">
    <div>
      <h1 class="admin-page-title">System Overview</h1>
      <p class="admin-page-desc">Real-time platform health & engagement metrics</p>
    </div>
  </header>
  <div style="padding:0 var(--spacing-xxl);">
    <div id="kpi-grid" class="dash-kpi-grid">
      <div class="admin-loading"><div class="admin-spinner"></div><p>Loading KPIs...</p></div>
    </div>
    <div class="dash-bottom-grid">
      <div class="dash-card">
        <h3 class="dash-card-title">Recent Users</h3>
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
          <tbody id="recent-users-body"><tr><td colspan="4" style="text-align:center;padding:24px;">Loading...</td></tr></tbody>
        </table>
      </div>
      <div class="dash-card">
        <h3 class="dash-card-title">Recent Tasks</h3>
        <table class="admin-table">
          <thead><tr><th>Title</th><th>Budget</th><th>Status</th><th>Created</th></tr></thead>
          <tbody id="recent-tasks-body"><tr><td colspan="4" style="text-align:center;padding:24px;">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>
<script type="module" src="../../js/admin/admin.js"></script>
</body>
</html>
