<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - GigsForGigs Admin</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/super-admin.css">
</head>
<body>
<div class="admin-sidebar" id="admin-sidebar"></div>
<main class="admin-main">
  <header class="admin-page-header">
    <div>
      <div class="admin-breadcrumbs"><a href="dashboard.html">Dashboard</a> <span>›</span> Tasks</div>
      <h1 class="admin-page-title">Task Management</h1>
      <p class="admin-page-desc">All platform tasks with status tracking</p>
    </div>
    <div class="admin-header-actions">
      <div id="tasks-search-container"></div>
      <button class="btn btn-primary-blue" id="add-btn">+ Create Task</button>
    </div>
  </header>
  <div style="padding:0 var(--spacing-xxl);">
    <div class="admin-card">
      <div class="admin-table-toolbar">
        <div id="tasks-filter-container"></div>
        <span class="admin-table-count" id="tasks-count"></span>
      </div>
      <table class="admin-table">
        <thead><tr><th>Task ID</th><th>Title</th><th>Client ID</th><th>Budget</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="7" style="text-align:center;padding:24px;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>
<script type="module" src="../../js/admin/admin.js"></script>
</body>
</html>
