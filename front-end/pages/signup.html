<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - GigsForGigs</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

  <div class="auth-container">
    <!-- Left Panel (Illustration) -->
    <div class="auth-illustration signup-ill">
      <a href="../index.html" class="auth-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-primary-blue)">
          <circle cx="12" cy="12" r="10" />
        </svg>
        GigsForGigs
      </a>

      <div class="auth-text">
        <h2>Empowering Global Creativity</h2>
        <p>Join thousands of professionals finding their next big opportunity. Post tasks, find work, and collaborate
          globally.</p>
      </div>
      <!-- Placeholder SVG for pure CSS visualization -->
      <svg width="100%" height="300" viewBox="0 0 400 300">
        <circle cx="100" cy="150" r="60" fill="var(--color-primary-blue)" opacity="0.1" />
        <circle cx="280" cy="100" r="80" fill="var(--color-border)" opacity="0.3" />
        <path d="M100 150 Q200 50 300 250" fill="none" stroke="var(--color-primary-dark)" stroke-width="4"
          stroke-dasharray="10 10" />
        <circle cx="300" cy="250" r="10" fill="var(--color-primary-blue)" />
      </svg>
    </div>

    <!-- Right Panel (Form) -->
    <div class="auth-form-wrapper">
      <div class="auth-form-container">

        <div class="auth-header">
          <h1>Create your GigsForGigs account</h1>
          <p>Start your journey with us today.</p>
        </div>

        <form class="auth-form" id="signup-form">
          <div class="form-group">
            <label class="form-label" for="role">Sign up as</label>
            <select id="role" class="form-input" style="appearance: auto; cursor: pointer;" required>
              <option value="" disabled selected>Select your role</option>
              <option value="client">Client</option>
              <option value="gig">Gig Professional</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="fullname">Full Name</label>
            <input type="text" id="fullname" class="form-input" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
          </div>

          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary btn-full" style="margin-top: var(--spacing-lg);">Create
            Account</button>
        </form>

        <div class="divider">or continue with</div>

        <button class="btn btn-outline btn-full btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Google
        </button>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Log In</a>
        </div>

      </div>
    </div>
  </div>

  <script type="module" src="../js/main.js"></script>

</body>

</html>
