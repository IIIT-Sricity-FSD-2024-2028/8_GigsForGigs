<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Role Selection - GigsForGigs</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body style="background-color: var(--color-bg-light); min-height: 100vh; display: flex; flex-direction: column;">

  <!-- Header -->
  <header class="header">
    <div class="container header-container" style="justify-content: center;">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-primary-dark)"><circle cx="12" cy="12" r="10"/></svg>
        GigsForGigs
      </a>
    </div>
  </header>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: var(--spacing-xxl) var(--spacing-md);">
    <div style="text-align: center; max-width: 800px; width: 100%;">
      
      <h1 style="font-size: 2.25rem; font-weight: 700; color: var(--color-primary-dark); margin-bottom: var(--spacing-xxl);">How do you want to use GigsForGigs?</h1>

      <!-- Selection Grid: Links are wrapped to simulate flow -->
      <div class="selection-grid">
        
        <!-- Client Option -->
        <a id="client-role-link" href="profile-completion-client.html" style="display: block; text-decoration: none; color: inherit;">
          <div class="selection-card">
            <div class="check-indicator">✓</div>
            <div class="selection-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </div>
            <h2 class="selection-title">Client</h2>
            <p class="selection-desc">I want to hire talented professionals for projects</p>
          </div>
        </a>

        <!-- Professional Option -->
        <a id="gig-role-link" href="profile-completion-gig.html" style="display: block; text-decoration: none; color: inherit;">
          <div class="selection-card">
            <div class="check-indicator">✓</div>
            <div class="selection-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            </div>
            <h2 class="selection-title">Gig Professional</h2>
            <p class="selection-desc">I want to offer my skills and work on projects</p>
          </div>
        </a>

      </div>

      <div style="margin-top: var(--spacing-xxl);">
        <!-- Helper text since click handles navigation -->
        <p style="color: var(--color-text-muted); font-size: 0.875rem;">Click on a card to continue with your setup</p>
      </div>

    </div>
  </main>

  <script>
    const clientRoleLink = document.getElementById('client-role-link');
    const gigRoleLink = document.getElementById('gig-role-link');
    const queryString = window.location.search;
    const params = new URLSearchParams(queryString);
    const isFirstTimeFromQuery = params.get('firstTime') === '1';
    const isFirstTimeFromStorage = sessionStorage.getItem('isFirstTimeJoin') === '1';
    const shouldKeepFirstTime = isFirstTimeFromQuery || isFirstTimeFromStorage;

    if (isFirstTimeFromQuery) {
      sessionStorage.setItem('isFirstTimeJoin', '1');
    }

    if (shouldKeepFirstTime) {
      if (clientRoleLink) {
        clientRoleLink.href += '?firstTime=1';
      }

      if (gigRoleLink) {
        gigRoleLink.href += '?firstTime=1';
      }
    }
  </script>

</body>
</html>
