<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Gig - GigsForGigs</title>
  <meta name="description" content="Post a new gig and find the right professional on GigsForGigs.">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/forms.css">
  <link rel="stylesheet" href="../../css/client-dashboard.css">
</head>
<body>

<div class="dashboard-layout">

  <!-- ─── Sidebar ─────────────────────────────────────────────── -->
  <aside class="dashboard-sidebar">
    <a href="client-dashboard.html" class="client-sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 12l3 3 5-5"></path></svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">GigFlow</span>
        <span class="brand-sub">Client Portal</span>
      </div>
    </a>

    <nav class="sidebar-nav">
      <a href="client-dashboard.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Dashboard
      </a>
      <a href="search-talent.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        Search Talent
      </a>
      <a href="my-gigs-client.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        My Gigs
      </a>
      <a href="client-dashboard.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        Total Spent
      </a>
      <a href="client-profile-selection.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Supervise Manager
      </a>
    </nav>

    <div class="sidebar-user-info">
      <div class="user-avatar user-avatar-seagrass">AJ</div>
      <div class="user-details">
        <div class="user-name">Aditya</div>
        <div class="user-role">Premium Account</div>
      </div>
      <div class="online-dot"></div>
    </div>
  </aside>

  <!-- ─── Main Content ────────────────────────────────────────── -->
  <main class="dashboard-main">

    <header class="dashboard-topbar">
      <div class="topbar-actions">
      </div>
    </header>

    <div class="dashboard-content">

      <div class="post-gig-form">

        <h1 class="page-title form-page-header">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Post a Gig
        </h1>
        <p class="form-page-description">Describe your project requirements so relevant professionals can discover and apply to your gig.</p>

        <form action="client-dashboard.html" method="GET" id="post-gig-form">

          <div class="form-group">
            <label class="form-label" for="gig-title">Gig Title</label>
            <input type="text" id="gig-title" class="form-input" placeholder="e.g. Need a Senior React Developer for 3 months" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="category">Category</label>
              <select id="category" class="form-input" required>
                <option value="" disabled selected>Select category...</option>
                <option value="design">Design &amp; Creative</option>
                <option value="dev">Software Development</option>
                <option value="writing">Writing &amp; Translation</option>
                <option value="marketing">Digital Marketing</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="duration">Expected Duration</label>
              <select id="duration" class="form-input" required>
                <option value="one-time">One-time project</option>
                <option value="less-month">Less than 1 month</option>
                <option value="1-3-months">1 to 3 months</option>
                <option value="3-6-months">3 to 6 months</option>
                <option value="ongoing">Ongoing</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="description">Detailed Description</label>
            <textarea id="description" class="form-input" rows="6" placeholder="Describe the project scope, required skills, and specific deliverables you expect..." required></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Pricing Structure</label>
              <div class="pricing-group">
                <label class="pricing-option">
                  <input type="radio" name="pricing" value="fixed" checked required> Fixed Budget
                </label>
                <label class="pricing-option">
                  <input type="radio" name="pricing" value="hourly"> Hourly Rate
                </label>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="budget">Budget ($)</label>
              <input type="number" id="budget" class="form-input" placeholder="0.00" min="5" step="1" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Required Skills (Comma separated)</label>
            <input type="text" id="skills" class="form-input" placeholder="e.g. React, Node.js, Typescript">
          </div>

          <div class="form-group">
            <label class="form-label">Attachments (Optional)</label>
            <div class="file-upload-area">
              <div class="file-upload-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
              </div>
              <p>Upload project briefs or brand guidelines</p>
              <span class="file-upload-hint">PDF, DOCX, ZIP (Max 25MB)</span>
            </div>
          </div>

          <div class="form-footer">
            <a href="client-dashboard.html" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">Publish Gig</button>
          </div>

        </form>
      </div>

    </div>
  </main>
</div>

<script type="module" src="../../js/main.js"></script>

</body>
</html>
