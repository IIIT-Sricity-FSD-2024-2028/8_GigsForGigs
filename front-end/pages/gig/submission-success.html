<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Successful - GigsForGigs</title>
  <meta name="description" content="Your deliverable has been submitted successfully on GigsForGigs.">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .success-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--color-bg-light);
      padding: var(--spacing-xl);
    }

    .success-card {
      background-color: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xxl) 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background-color: rgba(81, 158, 138, 0.12);
      margin: 0 auto var(--spacing-xl);
      animation: popIn 0.4s ease 0.2s both;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-icon-wrap svg {
      color: var(--color-secondary);
    }

    .success-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-text-dark);
      margin-bottom: var(--spacing-sm);
    }

    .success-message {
      font-size: 0.9375rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: var(--spacing-xxl);
    }

    .success-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      padding: 14px 32px;
      background-color: var(--color-primary-dark);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-family-sans);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(8, 75, 131, 0.25);
    }

    .success-btn:hover {
      background-color: #063a66;
      box-shadow: 0 4px 14px rgba(8, 75, 131, 0.35);
      transform: translateY(-1px);
    }

    .success-btn:active {
      transform: translateY(0);
    }

    .success-confetti {
      font-size: 2rem;
      margin-bottom: var(--spacing-md);
      animation: bounce 0.6s ease 0.5s both;
    }

    @keyframes bounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="success-container">
  <div class="success-card">

    <div class="success-confetti">🎉</div>

    <div class="success-icon-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" width="44" height="44" viewBox="0 0 24 24">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>

    <h1 class="success-title">Task Submitted Successfully!</h1>
    <p class="success-message">
      Your deliverable has been submitted and is now under review by the client.
      You'll be notified once the client reviews your work.
    </p>

    <a href="gig-dashboard.html" class="success-btn" id="back-to-dashboard-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Back to Dashboard
    </a>

  </div>
</div>

<script type="module" src="../../js/main.js"></script>

</body>
</html>
