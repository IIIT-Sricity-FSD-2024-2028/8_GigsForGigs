<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GigsForGigs</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="dashboard">
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <a href="dashboard.html" class="sidebar-header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-white)"><circle cx="12" cy="12" r="10"/></svg>
        GigsForGigs
      </a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Active Tasks</a>
        <a href="#" class="nav-item">Completed</a>
        <a href="#" class="nav-item">Reports</a>
      </nav>
      <div class="sidebar-footer">
        <div class="profile-mini" id="userInitials">GF</div>
        <div style="font-size: 0.875rem;">
          <div style="font-weight: 600;" id="userName">Guest</div>
          <div style="color: rgba(240, 246, 246, 0.7); font-size: 0.75rem;" id="userRole">User</div>
        </div>
      </div>
    </aside>

    <main class="dashboard-main">
      <header class="dashboard-topbar">
        <div class="topbar-search">
          <svg fill="none" stroke="var(--color-text-muted)" stroke-width="2" width="18" height="18" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" placeholder="Search tasks..." id="taskSearch">
        </div>
        <div style="display: flex; gap: var(--spacing-md); align-items: center;">
          <button class="btn btn-primary" id="addTaskButton" type="button">Add Task</button>
          <button class="btn btn-outline" id="logoutButton" type="button">Logout</button>
        </div>
      </header>

      <div class="dashboard-content">
        <h1 class="page-title">Tasks Overview</h1>
        <p class="text-muted">Manage tasks with role-based permissions.</p>

        <section class="tasks-section">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
            <h2 class="section-title" style="margin-bottom: 0;">Active Tasks</h2>
            <span class="role-chip" id="roleChip">Role: user</span>
          </div>
          <div class="empty-state hidden" id="emptyState">No items available.</div>
          <table class="tasks-table" id="tasksTable">
            <thead>
              <tr>
                <th>Task Title</th>
                <th>Client</th>
                <th>Deadline</th>
                <th>Budget</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tasksTableBody"></tbody>
          </table>
        </section>

        <section class="dashboard-section" id="taskFormSection">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
            <h2 class="section-title" style="margin-bottom: 0;">Task Form</h2>
            <span class="text-muted" id="formMode">Create new task</span>
          </div>
          <form id="taskForm">
            <div class="form-group">
              <label class="form-label" for="taskTitle">Task title</label>
              <input type="text" id="taskTitle" name="taskTitle" class="form-input" placeholder="e.g. API integration" required>
              <span class="form-error" data-error-for="taskTitle"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="taskClient">Client</label>
              <input type="text" id="taskClient" name="taskClient" class="form-input" placeholder="Client name" required>
              <span class="form-error" data-error-for="taskClient"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="taskDeadline">Deadline</label>
              <input type="date" id="taskDeadline" name="taskDeadline" class="form-input" required>
              <span class="form-error" data-error-for="taskDeadline"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="taskBudget">Budget (USD)</label>
              <input type="number" id="taskBudget" name="taskBudget" class="form-input" min="0" step="0.01" placeholder="0.00" required>
              <span class="form-error" data-error-for="taskBudget"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="taskStatus">Status</label>
              <select id="taskStatus" name="taskStatus" class="form-select" required>
                <option value="pending">Pending</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
              </select>
              <span class="form-error" data-error-for="taskStatus"></span>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-outline" id="cancelEdit">Cancel</button>
              <button type="submit" class="btn btn-primary" id="saveTask">Save Task</button>
            </div>
            <div class="form-error" id="formError"></div>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
