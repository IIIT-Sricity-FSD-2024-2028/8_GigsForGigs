<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot PIN - GigsForGigs</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modals.css">
  <style>
    body { overflow: hidden; }
  </style>
</head>
<body class="profile-chooser">

  <!-- Background content mimicking the chooser -->
  <header class="chooser-header container">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-primary-dark)"><circle cx="12" cy="12" r="10"/></svg>
      GigsForGigs
    </div>
  </header>

  <main class="chooser-content" style="pointer-events: none;">
    <h1 class="chooser-title">Who's using this account?</h1>
    <div class="profile-grid">
      <div class="profile-avatar-btn">
        <div class="avatar-square">A</div>
        <div style="display: flex; flex-direction: column; align-items: center;">
          <span class="avatar-name">Admin</span>
          <span class="avatar-role">Client Owner</span>
        </div>
      </div>
      <div class="profile-avatar-btn">
        <div class="avatar-square" style="color: var(--color-white); background-color: var(--color-primary-blue);">M1</div>
        <div style="display: flex; flex-direction: column; align-items: center;">
          <span class="avatar-name">Manager 1</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Overlay -->
  <div class="blurred-backdrop">
    <div class="modal-card">
      
      <div class="modal-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"></path><circle cx="16.5" cy="7.5" r=".5"></circle></svg>
      </div>

      <h2 class="modal-title">Forgot PIN</h2>
      <p class="modal-subtitle">Enter your email address and we'll send you a link to reset your PIN.</p>

      <form action="client-profile-selection.html" method="GET" style="text-align: left;">
        
        <div class="form-group" style="text-align: left;">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="user@email.com" required>
        </div>

        <button type="submit" class="btn btn-primary-blue btn-full" style="margin-top: var(--spacing-md); margin-bottom: var(--spacing-xl);">Send Reset Link</button>

      </form>

      <div>
        <a href="profile-locked.html" class="btn btn-outline btn-full btn-icon" style="justify-content: center; text-decoration: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back
        </a>
      </div>

    </div>
  </div>

</body>
</html>
