<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard-layout">
  
  <!-- Sidebar -->
  <aside class="dashboard-sidebar">
    <a href="gig-dashboard.html" class="sidebar-header">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-white)"><circle cx="12" cy="12" r="10"/></svg>
      GigsForGigs
    </a>
    
    <nav class="sidebar-nav">
      <a href="gig-dashboard.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Dashboard
      </a>
      <a href="explore-tasks.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        Explore Tasks
      </a>
      <a href="active-tasks.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        Active Tasks
      </a>
      <a href="pending-requests.html" class="nav-item active">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        Pending Requests
      </a>
      <a href="completed-projects.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Completed projects
      </a>
      <a href="total-earnings.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        Total Earnings
      </a>
      <a href="post-service.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Post a Service
      </a>
      <a href="gig-profile.html" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        My Profile
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <div class="profile-mini">JD</div>
      <div style="font-size: 0.875rem;">
        <div style="font-weight: 600;">John Doe</div>
        <div style="color: rgba(240, 246, 246, 0.7); font-size: 0.75rem;">Gig Professional</div>
      </div>
      <a href="index.html" style="margin-left: auto; color: var(--color-white);" title="Log out">
        <svg fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="dashboard-main">
    
    <header class="dashboard-topbar">
      <div class="topbar-search">
        <svg fill="none" stroke="var(--color-text-muted)" stroke-width="2" width="18" height="18" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" placeholder="Search tasks, clients, messages...">
      </div>
      <div style="display: flex; gap: var(--spacing-lg); align-items: center;">
        <button class="btn btn-primary" onclick="window.location.href='post-service.html'">Post a Service</button>
      </div>
    </header>

    <div class="dashboard-content container">
      
      <div style="display: flex; align-items: center; gap: var(--spacing-sm); margin-bottom: var(--spacing-sm);">
        <a href="pending-requests.html" style="color: var(--color-text-muted); text-decoration: none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h1 class="page-title" style="margin-bottom: 0;">Decline Request</h1>
      </div>
      
      <p style="color: var(--color-text-muted); margin-bottom: var(--spacing-xxl);">Please provide a reason for declining this project offer.</p>
      
      <!-- task list -->
      <section style="display: flex; flex-direction: column; gap: var(--spacing-lg); max-width: 800px;">
        
        <div class="task-card" style="align-items: flex-start; padding: var(--spacing-xl); flex-direction: column;">
          
          <div style="width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--spacing-md);">
              <div class="task-details">
                <div style="display: flex; align-items: center; gap: var(--spacing-sm); margin-bottom: var(--spacing-sm);">
                  <div style="width: 32px; height: 32px; background-color: var(--color-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.875rem;">AC</div>
                  <span style="font-weight: 500; color: var(--color-text-dark);">Acme Corp</span>
                </div>
                <h3 style="font-size: 1.25rem;">Logo Design for Startup</h3>
              </div>
              <div style="text-align: right;">
                <div style="font-size: 1.5rem; font-weight: 700; color: var(--color-secondary);">$450</div>
              </div>
            </div>
            
            <form action="pending-requests.html" method="GET" style="margin-top: var(--spacing-xl); border-top: 1px solid var(--color-border); padding-top: var(--spacing-xl);">
              
              <div style="margin-bottom: var(--spacing-md);">
                <label class="form-label" style="display: block; margin-bottom: var(--spacing-sm); font-weight: 600; color: var(--color-text-dark);">Why are you declining this request?</label>
                
                <div style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
                  <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                    <input type="radio" name="reason" value="schedule" required>
                    Schedule conflict / Fully booked
                  </label>
                  <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                    <input type="radio" name="reason" value="budget">
                    Budget is too low
                  </label>
                  <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                    <input type="radio" name="reason" value="skills">
                    Not a good fit for my skills
                  </label>
                  <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                    <input type="radio" name="reason" value="other">
                    Other reason
                  </label>
                </div>
              </div>

              <div style="margin-bottom: var(--spacing-xl);">
                <label class="form-label" for="decline-msg" style="display: block; margin-bottom: var(--spacing-sm); font-weight: 600; color: var(--color-text-dark);">Optional Message to Client</label>
                <textarea id="decline-msg" class="form-input" rows="4" style="width: 100%; border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: var(--spacing-sm);" placeholder="Hi Acme Corp, thank you for the offer..."></textarea>
              </div>

              <div style="display: flex; gap: var(--spacing-md); justify-content: flex-end;">
                <a href="pending-requests.html" class="btn btn-outline" style="text-decoration: none;">Cancel</a>
                <!-- We route back to pending requests to simulate removal -->
                <button type="submit" class="btn btn-primary" style="background-color: #d32f2f; border-color: #d32f2f;">Confirm Decline</button>
              </div>

            </form>
          </div>
        </div>

      </section>

    </div>
  </main>
</div>

</body>
</html>
