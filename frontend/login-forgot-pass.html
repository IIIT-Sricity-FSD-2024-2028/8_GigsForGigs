<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - GigsForGigs</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-container">
    <!-- Left Panel (Illustration) -->
    <div class="auth-illustration">
      <a href="index.html" class="auth-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-primary-blue)"><circle cx="12" cy="12" r="10"/></svg>
        GigsForGigs
      </a>

      <div class="auth-text">
        <h2>Secure your account.</h2>
        <p>Get back to collaborating on the next generation of digital products safely and securely.</p>
      </div>
      <!-- Placeholder SVG for pure CSS visualization -->
      <svg width="100%" height="300" viewBox="0 0 400 300" style="opacity: 0.5;">
        <rect x="150" y="100" width="100" height="150" fill="var(--color-bg-light)" rx="16" opacity="0.8"/>
        <path d="M165 100 v-30 a35 35 0 0 1 70 0 v30" fill="none" stroke="var(--color-primary-blue)" stroke-width="12" stroke-linecap="round"/>
        <circle cx="200" cy="175" r="15" fill="var(--color-primary-blue)"/>
      </svg>
    </div>

    <!-- Right Panel (Form) -->
    <div class="auth-form-wrapper">
      <div class="auth-form-container">
        
        <div class="auth-header">
          <h1>Forgot Password</h1>
          <p>Enter your email address to receive a recovery link.</p>
        </div>

        <form class="auth-form" action="login.html" method="GET">
          <div class="form-group" style="margin-bottom: var(--spacing-lg);">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Send Recovery Email</button>
        </form>

        <div style="margin-top: var(--spacing-xl); text-align: center;">
          <a href="login.html" class="btn btn-outline btn-full btn-icon" style="justify-content: center; text-decoration: none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Login
          </a>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
