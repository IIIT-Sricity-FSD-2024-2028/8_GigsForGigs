<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation Sent - GigsForGigs</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/client-dashboard.css">
</head>
<body class="profile-chooser">

  <!-- Background Content (Blurred) -->
  <header class="chooser-header container" style="filter: blur(4px);">
    <a href="index.html" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-primary-dark)"><circle cx="12" cy="12" r="10"/></svg>
      GigsForGigs
    </a>
  </header>

  <main class="chooser-content" style="filter: blur(4px);">
    <h1 class="chooser-title">Who's using this account?</h1>
    <div class="profile-grid">
      <button class="profile-avatar-btn" type="button">
        <div class="avatar-square">A</div>
      </button>
      <button class="profile-avatar-btn" type="button">
        <div class="avatar-square" style="color: var(--color-white); background-color: var(--color-primary-blue);">M1</div>
      </button>
      <button class="profile-avatar-btn add-profile-btn" type="button">
        <div class="avatar-square">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
      </button>
    </div>
  </main>

  <!-- Overlay Modal -->
  <div class="invitation-overlay">
    <div class="invitation-modal">
      <div style="display: inline-flex; justify-content: center; align-items: center; width: 64px; height: 64px; background-color: rgba(81, 158, 138, 0.1); border-radius: 50%; color: var(--color-secondary); margin-bottom: var(--spacing-lg);">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      
      <h2 style="font-size: 1.5rem; color: var(--color-text-dark); margin-bottom: var(--spacing-sm); font-weight: 700;">Invitation Sent!</h2>
      <p style="color: var(--color-text-muted); font-size: 0.875rem; margin-bottom: var(--spacing-xl);">We've emailed an invitation link to your colleague. They can join your workspace and start managing gigs.</p>
      
      <a href="client-profile-selection.html" class="btn btn-primary btn-full" style="text-decoration: none; display: block; text-align: center;">Got it!</a>
    </div>
  </div>

</body>
</html>
