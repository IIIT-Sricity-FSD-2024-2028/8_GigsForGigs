<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Profile - GigsForGigs</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modals.css">
</head>
<body class="profile-chooser">

  <!-- Minimal Header -->
  <header class="chooser-header container">
    <a href="index.html" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-primary-dark)"><circle cx="12" cy="12" r="10"/></svg>
      GigsForGigs
    </a>
  </header>

  <main class="chooser-content">
    <h1 class="chooser-title">Who's using this account?</h1>

    <div class="profile-grid">
      
      <!-- Admin Profile -->
      <a href="client-dashboard.html" style="text-decoration: none;">
        <button class="profile-avatar-btn" type="button">
          <div class="avatar-square">
            A
          </div>
          <div style="display: flex; flex-direction: column; align-items: center;">
            <span class="avatar-name">Admin</span>
            <span class="avatar-role">Client Owner</span>
          </div>
        </button>
      </a>

      <!-- Manager 1 -->
      <a href="manager-dashboard.html" style="text-decoration: none;">
        <button class="profile-avatar-btn" type="button">
          <div class="avatar-square" style="color: var(--color-white); background-color: var(--color-primary-blue);">
            M1
          </div>
          <div style="display: flex; flex-direction: column; align-items: center;">
            <span class="avatar-name">Manager 1</span>
          </div>
        </button>
      </a>

      <!-- Manager 2 -->
      <a href="manager-dashboard.html" style="text-decoration: none;">
        <button class="profile-avatar-btn" type="button">
          <div class="avatar-square" style="color: var(--color-white); background-color: var(--color-secondary);">
            M2
          </div>
          <div style="display: flex; flex-direction: column; align-items: center;">
            <span class="avatar-name">Manager 2</span>
          </div>
        </button>
      </a>

      <!-- Add Manager / Add Profile -->
      <a href="add-manager.html" style="text-decoration: none;">
        <button class="profile-avatar-btn add-profile-btn" type="button">
          <div class="avatar-square">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </div>
          <div style="display: flex; flex-direction: column; align-items: center;">
            <span class="avatar-name">Add Manager</span>
          </div>
        </button>
      </a>

    </div>
  </main>

  <footer style="text-align: center; padding: 20px; font-size: 0.8rem; color: var(--color-text-muted);">
    &copy; 2024 GigsForGigs. All Rights Reserved.
  </footer>

</body>
</html>
