<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Locked - GigsForGigs</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modals.css">
  <!-- Ensure body does not scroll behind modal -->
  <style>
    body { overflow: hidden; }
  </style>
</head>
<body class="profile-chooser">

  <!-- Background content mimicking the chooser -->
  <header class="chooser-header container">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-primary-dark)"><circle cx="12" cy="12" r="10"/></svg>
      GigsForGigs
    </div>
  </header>

  <main class="chooser-content" style="pointer-events: none;">
    <h1 class="chooser-title">Who's using this account?</h1>
    <div class="profile-grid">
      <div class="profile-avatar-btn">
        <div class="avatar-square">A</div>
        <div style="display: flex; flex-direction: column; align-items: center;">
          <span class="avatar-name">Admin</span>
          <span class="avatar-role">Client Owner</span>
        </div>
      </div>
      <div class="profile-avatar-btn">
        <div class="avatar-square" style="color: var(--color-white); background-color: var(--color-primary-blue);">M1</div>
        <div style="display: flex; flex-direction: column; align-items: center;">
          <span class="avatar-name">Manager 1</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Overlay -->
  <div class="blurred-backdrop">
    <div class="modal-card">
      
      <div class="modal-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>

      <h2 class="modal-title">Profile Locked</h2>
      <p class="modal-subtitle">Enter your 4-digit PIN to continue.</p>

      <form action="index.html" method="GET">
        <div class="pin-inputs">
          <input type="password" class="pin-cell" maxlength="1" required>
          <input type="password" class="pin-cell" maxlength="1" required>
          <input type="password" class="pin-cell" maxlength="1" required>
          <input type="password" class="pin-cell" maxlength="1" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-bottom: var(--spacing-lg);">Unlock Profile</button>
      </form>

      <div class="modal-actions">
        <!-- Allows back navigation out of the modal state -->
        <a href="client-profile-selection.html" class="btn btn-outline btn-full btn-icon" style="justify-content: center; text-decoration: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3v4a4 4 0 0 1-4 4H4"></path><polyline points="8 15 4 11 8 7"></polyline></svg>
          Switch Profile
        </a>
      </div>

      <div style="margin-top: var(--spacing-xl);">
        <a href="forgot-pin.html" style="color: var(--color-primary-blue); font-size: 0.875rem; text-decoration: none; font-weight: 500;">Forgot your PIN?</a>
      </div>

    </div>
  </div>

</body>
</html>
